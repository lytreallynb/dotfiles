# Better colors for Kitty
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Fix escape delay for Neovim
set -sg escape-time 0

# Enable focus events for autoread
set -g focus-events on

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# ------- Magnet-style keybindings -------
# Change prefix to Ctrl+A (easier than Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes (like Magnet snapping)
# Ctrl+A then | = split side by side (vertical line)
# Ctrl+A then - = split top/bottom (horizontal line)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Navigate panes with Alt+Arrow (NO prefix needed, just like Magnet!)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Also vim-style: Alt+H/J/K/L to move between panes (no prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes with Ctrl+Alt+Arrow (like Magnet resize)
bind -n C-M-Left resize-pane -L 3
bind -n C-M-Right resize-pane -R 3
bind -n C-M-Up resize-pane -U 3
bind -n C-M-Down resize-pane -D 3

# New window with Ctrl+A then C
bind c new-window -c "#{pane_current_path}"

# Switch windows with Alt+1/2/3... (no prefix needed)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Close pane with Ctrl+A then X
bind x kill-pane

# Reload config with R
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Don't rename windows automatically
set -g allow-rename off

# ------- Status bar (cyberdream theme) -------
set -g status-position bottom
set -g status-style 'bg=#16181A fg=#ffffff'
set -g status-left '#[bg=#5EA1FF,fg=#16181A,bold] #S #[bg=#16181A] '
set -g status-left-length 20
set -g status-right '#[fg=#FFBD5E]%H:%M #[fg=#5EFF6C]%b %d '
set -g status-right-length 30

# Active window
setw -g window-status-current-style 'bg=#5EA1FF fg=#16181A bold'
setw -g window-status-current-format ' #I:#W '

# Inactive window
setw -g window-status-style 'bg=#3C4048 fg=#ffffff'
setw -g window-status-format ' #I:#W '

# Pane borders
set -g pane-border-style 'fg=#3C4048'
set -g pane-active-border-style 'fg=#5EA1FF'
